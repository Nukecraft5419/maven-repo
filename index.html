<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nukecraft5419 | Maven Repo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap">
    <style>
        :root {
            /* Catppuccin Mocha Palette */
            --base: #1e1e2e;
            --mantle: #181825;
            --crust: #11111b;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --surface: #313244;
            --overlay: #6c7086;
            --blue: #89b4fa;
            --mauve: #cba6f7;
            --green: #a6e3a1;
        }

        /* Background Layers */
        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            background-color: var(--base);
            z-index: -2;
            top: 0; left: 0;
        }

        #spotlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle 400px at var(--x, 50%) var(--y, 50%), rgba(137, 180, 250, 0.12), transparent 80%);
        }

        /* Entrance Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {
            margin: 0;
            color: var(--text);
            font-family: 'Inter', 'Ubuntu', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .anim-1 { animation: slideUp 0.6s ease forwards; }
        .anim-2 { animation: slideUp 0.8s ease forwards; opacity: 0; }
        .anim-3 { animation: slideUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }
        .anim-4 { animation: fadeIn 1.2s ease forwards; opacity: 0; }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 2.8rem;
            color: var(--blue);
            text-align: center;
            font-weight: 800;
            letter-spacing: -1.5px;
            text-shadow: 0 0 20px rgba(137, 180, 250, 0.2);
        }

        .desc { text-align: center; margin-bottom: 2.5rem; color: var(--subtext); font-size: 1.15rem; }

        /* Main Container (Desktop First) */
        .container {
            background: rgba(24, 24, 37, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
            position: relative;
        }

        .container:hover { border-color: var(--blue); transform: translateY(-5px); }

        .tabs {
            display: flex;
            gap: 10px;
            background: var(--crust);
            padding: 8px 8px 0 8px;
            border-radius: 14px 14px 0 0;
            border: 1px solid var(--surface);
            border-bottom: none;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--subtext);
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s ease;
        }

        .tab-btn.active { background: var(--base); color: var(--blue); box-shadow: inset 0 -2px 0 var(--blue); }

        /* Code Block (Restored Desktop Specs) */
        pre {
            background: rgba(17, 17, 27, 0.8);
            padding: 2.5rem;
            border: 1px solid var(--surface);
            border-radius: 0 0 18px 18px;
            margin: 0;
            font-size: 15px; /* Back to original */
            overflow-x: auto;
            line-height: 1.8;
            height: 280px; /* Back to original height */
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
        }

        .kw { color: var(--mauve); font-weight: bold; }
        .str { color: var(--green); }
        .cmt { color: var(--overlay); font-style: italic; }

        .copy-btn {
            position: absolute; top: 20px; right: 20px;
            background: var(--surface); border: 1px solid var(--blue);
            color: var(--text); padding: 8px 18px; border-radius: 10px;
            cursor: pointer; font-weight: 700; font-size: 13px;
            transition: 0.3s; z-index: 10;
        }
        .copy-btn.success { background: var(--green); border-color: var(--green); color: var(--crust); }

        /* --- MOBILE & TABLET ADAPTATION --- */
        /* This only triggers on screens smaller than 768px */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 1.5rem; }
            pre { padding: 1.5rem; font-size: 13px; height: 320px; }
            .tabs { overflow-x: auto; gap: 5px; }
            .tab-btn { padding: 10px 15px; font-size: 13px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .desc { font-size: 1rem; margin-bottom: 1.5rem; }
            pre { height: 350px; } /* More height for vertical code on tiny screens */
            .extra-links a { margin: 5px 10px; display: inline-block; }
        }

        /* Footer Style */
        .footer { margin-top: 2.5rem; border-top: 1px solid var(--surface); padding-top: 2rem; text-align: center; }
        .footer a { color: var(--blue); text-decoration: none; font-weight: 700; }
        .extra-links { margin-top: 50px; text-align: center; color: var(--subtext); font-size: 14px; }
        .extra-links p { font-size: 15px; color: var(--subtext); margin-bottom: 15px; }
        .extra-links a { color: var(--overlay); text-decoration: none; margin: 0 15px; transition: 0.3s; display: inline-block; }
        .extra-links a:hover { color: var(--blue); transform: translateY(-2px); }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div id="spotlight"></div>

<h1 class="anim-1">📦 Nukecraft5419 Repo</h1>
<p class="desc anim-2">The official Maven repository of Nukecraft5419.</p>

<div class="container anim-3">
    <div class="tabs">
        <button class="tab-btn active" onclick="showCode('kts')">Gradle (Kotlin)</button>
        <button class="tab-btn" onclick="showCode('groovy')">Gradle (Groovy)</button>
        <button class="tab-btn" onclick="showCode('maven')">Maven</button>
    </div>

    <div class="code-container" style="position: relative;">
        <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">Copy</button>
        <pre id="code-block"><code></code></pre>
    </div>

    <div class="footer">
        Maintained by <a href="https://github.com/nukecraft5419" target="_blank">Nukecraft5419</a> •
        <a href="https://github.com/nukecraft5419/maven-repo" target="_blank">Source Code</a>
    </div>
</div>

<div class="extra-links anim-4">
    <p>⚡ Powered by GitHub Pages & Actions</p>
    <div>
        <a href="https://github.com/nukecraft5419/maven-repo/pulls" target="_blank">PRs Welcome</a>
        <a href="https://repo.nukecraft5419.com/dev/nukecraft5419/nukelexicon/maven-metadata.xml" target="_blank">Metadata</a>
        <a href="https://github.com/nukecraft5419" target="_blank">Author Profile</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    /**
     * Mouse Spotlight Logic
     * Syncs cursor coordinates with CSS custom properties
     */
    const spotlight = document.getElementById('spotlight');
    document.addEventListener('mousemove', (e) => {
        spotlight.style.setProperty('--x', e.clientX + 'px');
        spotlight.style.setProperty('--y', e.clientY + 'px');
    });

    /**
     * Particles.js Library Configuration
     * Renders an interactive starfield background
     */
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#89b4fa" },
            "opacity": { "value": 0.4 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#89b4fa", "opacity": 0.2, "width": 1 },
            "move": { "enable": true, "speed": 1.5 }
        },
        "interactivity": {
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
            "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } } }
        }
    });

    /**
     * Repository dependency snippets
     */
    const snippets = {
        kts: `repositories {\n    mavenCentral()\n    maven("https://repo.nukecraft5419.com/")\n}\n\ndependencies {\n    implementation("dev.nukecraft5419:nukelexicon:1.0.0")\n}`,
        groovy: `repositories {\n    mavenCentral()\n    maven { url 'https://repo.nukecraft5419.com/' }\n}\n\ndependencies {\n    implementation 'dev.nukecraft5419:nukelexicon:1.0.0'\n}`,
        maven: `<repository>\n    <id>nukecraft5419-repo</id>\n    <url>https://repo.nukecraft5419.com/</url>\n</repository>\n\n<dependency>\n    <groupId>dev.nukecraft5419</groupId>\n    <artifactId>nukelexicon</artifactId>\n    <version>1.0.0</version>\n</dependency>`
    };

    /**
     * Syntax Highlighting Engine
     * Uses a multi-pass approach to isolate strings/URLs before highlighting keywords
     * This prevents breaking URLs that contain reserved keywords like 'maven' or 'url'
     */
    function showCode(type) {
        const raw = snippets[type];
        window.currentRaw = raw; // Store raw text for clipboard

        // 1. Initial Escape of HTML entities
        let text = raw.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

        // 2. ISOLATION PASS: Protect strings and XML contents from being broken by keyword rules
        const savedStrings = [];
        const stringRegex = /(".+?"|'.+?'|(?<=&lt;url&gt;)(.*?)(?=&lt;\/url&gt;))/g;

        text = text.replace(stringRegex, (match) => {
            savedStrings.push(match);
            return `__SAVED_STR_${savedStrings.length - 1}__`;
        });

        // 3. KEYWORD PASS: Apply highlighting to reserved terms
        const kwList = ["repositories", "dependencies", "mavenCentral", "implementation", "maven", "url", "repository", "id", "groupId", "artifactId", "version", "dependency"];
        kwList.forEach(word => {
            const regex = new RegExp('\\b' + word + '\\b', 'g');
            text = text.replace(regex, `<span class="kw">${word}</span>`);
        });

        // 4. COMMENT PASS: Highlight code comments
        text = text.replace(/(\/\/.*|&lt;!--.*--&gt;)/g, '<span class="cmt">$1</span>');

        // 5. RESTORATION PASS: Re-inject protected strings with highlighting
        savedStrings.forEach((str, i) => {
            text = text.replace(`__SAVED_STR_${i}__`, `<span class="str">${str}</span>`);
        });

        // Inject processed HTML into the pre tag
        document.getElementById('code-block').innerHTML = `<code>${text}</code>`;

        // Update active state of tab buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.getAttribute('onclick').includes(type)) btn.classList.add('active');
        });
    }

    /**
     * Copy text to clipboard and trigger UI success state
     */
    function copyToClipboard() {
        const btn = document.getElementById('copy-btn');
        navigator.clipboard.writeText(window.currentRaw).then(() => {
            btn.innerText = "Copied!";
            btn.classList.add('success');
            setTimeout(() => {
                btn.innerText = "Copy";
                btn.classList.remove('success');
            }, 2000);
        });
    }

    // Default initialization with Kotlin script on page load
    document.addEventListener('DOMContentLoaded', () => showCode('kts'));
</script>

</body>
</html>
